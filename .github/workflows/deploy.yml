name: Deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*/__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "*.pyo" \
            --exclude "*.sqlite3" \
            --exclude "node_modules/*" \
            --exclude "applogs/*" \
            --exclude "logs/*" \
            --exclude "media/*" \
            --exclude "staticfiles/*" \
            --exclude "frontend/*" \
            --exclude ".env" \
            --exclude "deploy*.zip"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: myosce-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
