name: Deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  AZURE_WEBAPP_NAME: myosce-app
  AZURE_RESOURCE_GROUP: osce-rg

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect static files
        # Uses production storage backend (WhiteNoise CompressedManifest) so the
        # staticfiles/ manifest is correct for production serving.
        # DB connection is never made during collectstatic — placeholder values are safe.
        env:
          DJANGO_SETTINGS_MODULE: osce_project.settings.production
          SECRET_KEY: ci-placeholder-not-used-in-production
          ALLOWED_HOSTS: localhost,127.0.0.1
          DATABASE_URL: sqlite:///ci-placeholder.sqlite3
          DB_PASSWORD: placeholder
          DB_HOST: localhost
          SECURE_SSL_REDIRECT: "False"
        run: |
          python manage.py collectstatic --noinput

      - name: Build deployment zip
        # Use -x (info-zip glob) instead of --exclude so patterns apply recursively.
        # publish-profile.xml, .env, and large non-production files are excluded.
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "venv/*" \
            -x "*/__pycache__/*" \
            -x "*/.pytest_cache/*" \
            -x "**/*.pyc" \
            -x "**/*.pyo" \
            -x "*.sqlite3" \
            -x "node_modules/*" \
            -x "applogs/*" \
            -x "logs/*" \
            -x "media/*" \
            -x "frontend/*" \
            -x ".env" \
            -x "publish-profile.xml" \
            -x "deploy*.zip" \
            -x "patch*.zip" \
            -x "*.dump" \
            -x "osce_dev*" \
            -x "fix_*.py" \
            -x "restructure_layout.py" \
            -x "generate_*.py" \
            -x "check_storage.py"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure Azure app settings
        # Enable Oryx so it runs pip install from requirements.txt on Azure.
        # DISABLE_COLLECTSTATIC=1 stops Oryx running its own collectstatic —
        # we already ran it in CI and staticfiles/ is included in the zip.
        run: |
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              DISABLE_COLLECTSTATIC=1 \
            --output none

      - name: Set startup command
        # Set startup command explicitly so it survives re-deployments.
        run: |
          az webapp config set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --startup-file 'bash startup.sh' \
            --output none

      - name: Deploy to Azure Web App
        # 'az webapp deployment source config-zip' uses Kudu's /api/zipdeploy endpoint.
        # This is the ONLY az cli command that triggers the Oryx BUILD step
        # (pip install → creates wwwroot/antenv).
        # 'az webapp deploy --type zip' and 'azure/webapps-deploy@v3' both use
        # OneDeploy (/api/publish) which skips Oryx entirely.
        run: |
          az webapp deployment source config-zip \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --src deploy.zip

      - name: Logout of Azure
        if: always()
        run: az logout
