name: Deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*/__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "*.pyo" \
            --exclude "*.sqlite3" \
            --exclude "node_modules/*" \
            --exclude "applogs/*" \
            --exclude "logs/*" \
            --exclude "media/*" \
            --exclude "staticfiles/*" \
            --exclude "frontend/*" \
            --exclude ".env" \
            --exclude "deploy*.zip"

      - name: Deploy to Azure Web App
        run: |
          az webapp deployment source config-zip \
            -g osce-rg \
            -n myosce-app \
            --src deploy.zip
