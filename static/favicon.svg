<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="geometricPrecision">
  <defs>
    <!-- Rich teal background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#14b8a6" />
      <stop offset="100%" style="stop-color:#0f766e" />
    </linearGradient>
    <!-- Subtle inner shadow overlay -->
    <radialGradient id="shine" cx="35%" cy="28%" r="55%">
      <stop offset="0%"   style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.08" />
    </radialGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bgGrad)"/>
  <!-- Gloss sheen -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#shine)"/>

  <!-- MDI stethoscope path (viewBox 24x24 → scaled ×3.2, centred at 11,10) -->
  <g transform="translate(11, 10) scale(3.25)" filter="url(#softShadow)">
    <path fill="#ffffff"
      d="M19 8c.56 0 1 .43 1 1a1 1 0 0 1-1 1c-.57 0-1-.45-1-1c0-.57.43-1 1-1
         M2 2v9c0 2.96 2.19 5.5 5.14 5.91c.62 3.01 3.28 5.09 6.36 5.09
         a6.5 6.5 0 0 0 6.5-6.5v-3.69c1.16-.42 2-1.52 2-2.81a3 3 0 0 0-3-3
         a3 3 0 0 0-3 3c0 1.29.84 2.4 2 2.81v3.6c0 2.5-2 4.5-4.5 4.5
         c-2 0-3.68-1.21-4.28-3.01C12 16.3 14 13.8 14 11V2h-4v3h2v6
         a4 4 0 0 1-4 4a4 4 0 0 1-4-4V5h2V2z"/>
  </g>
</svg>